# traefik/dynamic/openclaw.yml -- Route to OpenClaw gateway
http:
  routers:
    openclaw:
      rule: "Host(`${PODCLAW_DOMAIN}`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: openclaw

    openclaw-ws:
      rule: "Host(`${PODCLAW_DOMAIN}`) && PathPrefix(`/ws`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: openclaw

  services:
    openclaw:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:18789"
