#cloud-config
# Variables substituted by launch scripts:
#   PODCLAW_ADMIN_USER   -- admin username for troubleshooting (required)
#   PODCLAW_SSH_KEY      -- SSH public key for admin user (required)
#   PODCLAW_DOMAIN       -- domain for TLS (optional, enables Traefik)
#   PODCLAW_CF_API_TOKEN -- Cloudflare API token for DNS challenge (optional)
#   PODCLAW_ACME_EMAIL   -- email for Let's Encrypt (optional)
package_update: true
package_upgrade: true
packages:
  - curl
  - git
  - podman
  - systemd-container
  - avahi-daemon
  - openssh-server
  - nano
  - tmux
  - jq
  - fuse-overlayfs
  - apparmor-utils

users:
  # Admin user for troubleshooting
  - name: ${PODCLAW_ADMIN_USER}
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${PODCLAW_SSH_KEY}

  # NOTE: The openclaw user is created in runcmd below (not here).
  # setup-podman.sh checks for existing users and skips creation if found.
  # We pre-create the user so we can configure fuse-overlayfs storage
  # BEFORE setup-podman.sh runs (avoiding the slow storage-chown-by-maps).

write_files:
  - path: /opt/podclaw/scripts/setup-openclaw.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # setup-openclaw.sh -- Set up OpenClaw on rootless Podman (Ubuntu 24.04)
      #
      # Run as root on a fresh Ubuntu 24.04 system. Installs its own
      # dependencies if missing. Called by cloud-init or run standalone.
      #
      # Usage: sudo ./setup-openclaw.sh
      #   Or:  curl -fsSL https://raw.githubusercontent.com/mikestankavich/podclaw/main/scripts/setup-openclaw.sh | sudo bash
      set -euo pipefail

      OPENCLAW_IMAGE="${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:main-slim}"
      OPENCLAW_USER="openclaw"
      OPENCLAW_HOME="/home/${OPENCLAW_USER}"

      log() { echo "==> $*"; }

      # --- Install dependencies if missing ---
      DEPS="podman fuse-overlayfs apparmor-utils systemd-container git curl jq"
      MISSING=""
      for pkg in $DEPS; do
        if ! dpkg -s "$pkg" &>/dev/null; then
          MISSING="$MISSING $pkg"
        fi
      done
      if [ -n "$MISSING" ]; then
        log "Installing dependencies:$MISSING"
        apt-get update -qq
        apt-get install -qq -y $MISSING
      fi

      # --- AppArmor userns profiles ---
      # Ubuntu 24.04 blocks unprivileged user namespaces. Grant userns to
      # podman, conmon, crun, slirp4netns, and pasta.
      log "Installing AppArmor userns profiles"
      for bin in podman conmon crun slirp4netns pasta; do
        cat > "/etc/apparmor.d/${bin}-userns" <<APPARMOR
      abi <abi/4.0>,
      include <tunables/global>

      profile ${bin} /usr/bin/${bin} flags=(unconfined) {
        userns,
      }
      APPARMOR
        apparmor_parser -r "/etc/apparmor.d/${bin}-userns"
      done

      # --- Create openclaw user ---
      log "Creating ${OPENCLAW_USER} user"
      if ! id "${OPENCLAW_USER}" &>/dev/null; then
        useradd -m -s /usr/sbin/nologin "${OPENCLAW_USER}"
      fi
      loginctl enable-linger "${OPENCLAW_USER}"
      OPENCLAW_UID=$(id -u "${OPENCLAW_USER}")
      systemctl start "user@${OPENCLAW_UID}.service" || true

      # --- Configure fuse-overlayfs storage ---
      log "Configuring fuse-overlayfs storage driver"
      mkdir -p "${OPENCLAW_HOME}/.config/containers"
      cat > "${OPENCLAW_HOME}/.config/containers/storage.conf" <<STORAGE
      [storage]
      driver = "overlay"

      [storage.options.overlay]
      mount_program = "/usr/bin/fuse-overlayfs"
      STORAGE
      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" "${OPENCLAW_HOME}/.config"

      # --- subuid/subgid ---
      if ! grep -q "^${OPENCLAW_USER}:" /etc/subuid 2>/dev/null; then
        echo "${OPENCLAW_USER}:100000:65536" >> /etc/subuid
        echo "${OPENCLAW_USER}:100000:65536" >> /etc/subgid
      fi

      # --- OpenClaw config ---
      log "Pre-creating OpenClaw config"
      mkdir -p "${OPENCLAW_HOME}/.openclaw/workspace"
      chmod 700 "${OPENCLAW_HOME}/.openclaw" "${OPENCLAW_HOME}/.openclaw/workspace"

      cat > "${OPENCLAW_HOME}/.openclaw/openclaw.json" <<CONFIG
      {
        "gateway": {
          "mode": "local",
          "trustedProxies": ["127.0.0.1", "::1"],
          "controlUi": {
            "dangerouslyAllowHostHeaderOriginFallback": true
          }
        }
      }
      CONFIG
      chmod 600 "${OPENCLAW_HOME}/.openclaw/openclaw.json"

      # --- Gateway auth token ---
      log "Generating gateway auth token"
      GATEWAY_TOKEN=$(openssl rand -hex 32)
      echo "OPENCLAW_GATEWAY_TOKEN=${GATEWAY_TOKEN}" > "${OPENCLAW_HOME}/.openclaw/.env"
      chmod 600 "${OPENCLAW_HOME}/.openclaw/.env"

      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" "${OPENCLAW_HOME}/.openclaw"

      # --- Clone and run OpenClaw setup ---
      log "Cloning OpenClaw repo"
      git clone https://github.com/openclaw/openclaw /opt/openclaw 2>/dev/null || true
      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" /opt/openclaw

      log "Running OpenClaw setup (pull image + install Quadlet)"
      sudo -u "${OPENCLAW_USER}" bash -c "cd /opt/openclaw && OPENCLAW_IMAGE=${OPENCLAW_IMAGE} OPENCLAW_PODMAN_QUADLET=1 OPENCLAW_PODMAN_PUBLISH_HOST=0.0.0.0 ./scripts/podman/setup.sh"

      # --- Patch Quadlet for LAN access ---
      QUADLET="${OPENCLAW_HOME}/.config/containers/systemd/openclaw.container"
      if [ -f "$QUADLET" ]; then
        log "Patching Quadlet for LAN port binding"
        sed -i 's|PublishPort=127.0.0.1:|PublishPort=0.0.0.0:|g' "$QUADLET"
        chown "${OPENCLAW_USER}:${OPENCLAW_USER}" "$QUADLET"
      fi

      # --- Start service ---
      log "Starting OpenClaw service"
      systemctl --machine "${OPENCLAW_USER}@" --user daemon-reload || true
      systemctl --machine "${OPENCLAW_USER}@" --user restart openclaw.service || true

      # --- Post-setup validation ---
      log "Running post-setup validation"
      sudo -u "${OPENCLAW_USER}" podman exec openclaw openclaw doctor --fix 2>&1 || true
      sudo -u "${OPENCLAW_USER}" podman exec openclaw openclaw security audit 2>&1 || true

      # --- Fix ownership ---
      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" "${OPENCLAW_HOME}" || true

      log "OpenClaw setup complete"

  - path: /opt/podclaw/scripts/setup-traefik.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # setup-traefik.sh -- Set up Traefik TLS for OpenClaw
      #
      # Requires: PODCLAW_DOMAIN, PODCLAW_CF_API_TOKEN, PODCLAW_ACME_EMAIL
      # Run as root after setup-openclaw.sh has completed.
      set -euo pipefail

      OPENCLAW_USER="openclaw"
      OPENCLAW_HOME="/home/${OPENCLAW_USER}"
      TRAEFIK_CONFIG="${OPENCLAW_HOME}/.config/traefik"
      SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
      REPO_ROOT="${SCRIPT_DIR}/.."

      log() { echo "==> $*"; }

      # Validate required variables
      for var in PODCLAW_DOMAIN PODCLAW_CF_API_TOKEN PODCLAW_ACME_EMAIL; do
        if [ -z "${!var:-}" ]; then
          echo "Error: ${var} is not set." >&2
          exit 1
        fi
      done

      # --- Allow unprivileged ports 80/443 ---
      # Rootless Podman can't bind to privileged ports by default.
      log "Enabling unprivileged port binding"
      sysctl -w net.ipv4.ip_unprivileged_port_start=0 > /dev/null
      if ! grep -q "ip_unprivileged_port_start" /etc/sysctl.d/99-podclaw.conf 2>/dev/null; then
        echo "net.ipv4.ip_unprivileged_port_start=0" > /etc/sysctl.d/99-podclaw.conf
      fi

      # --- Install Traefik config ---
      log "Installing Traefik config to ${TRAEFIK_CONFIG}"
      mkdir -p "${TRAEFIK_CONFIG}/dynamic"

      # Static config (substitute ACME email)
      sed "s#\${PODCLAW_ACME_EMAIL}#${PODCLAW_ACME_EMAIL}#g" \
        "${REPO_ROOT}/traefik/traefik.yml" > "${TRAEFIK_CONFIG}/traefik.yml"

      # Dynamic route config (substitute domain)
      sed "s#\${PODCLAW_DOMAIN}#${PODCLAW_DOMAIN}#g" \
        "${REPO_ROOT}/traefik/dynamic/openclaw.yml" > "${TRAEFIK_CONFIG}/dynamic/openclaw.yml"

      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" "${TRAEFIK_CONFIG}"

      # --- Install Quadlet unit ---
      log "Installing Traefik Quadlet"
      QUADLET_DIR="${OPENCLAW_HOME}/.config/containers/systemd"
      mkdir -p "${QUADLET_DIR}"

      sed "s#\${PODCLAW_CF_API_TOKEN}#${PODCLAW_CF_API_TOKEN}#g" \
        "${REPO_ROOT}/traefik/traefik.container" > "${QUADLET_DIR}/traefik.container"

      chown -R "${OPENCLAW_USER}:${OPENCLAW_USER}" "${QUADLET_DIR}"

      # --- Create DNS A record ---
      log "Creating DNS A record: ${PODCLAW_DOMAIN}"
      GUEST_IP=$(hostname -I | awk '{print $1}')

      # Get zone ID from domain
      ZONE_NAME=$(echo "${PODCLAW_DOMAIN}" | awk -F. '{print $(NF-1)"."$NF}')
      ZONE_ID=$(curl -sf -X GET "https://api.cloudflare.com/client/v4/zones?name=${ZONE_NAME}" \
        -H "Authorization: Bearer ${PODCLAW_CF_API_TOKEN}" \
        -H "Content-Type: application/json" | jq -r '.result[0].id')

      if [ -z "${ZONE_ID}" ] || [ "${ZONE_ID}" = "null" ]; then
        echo "WARNING: Could not find Cloudflare zone for ${ZONE_NAME}. Create the DNS record manually." >&2
      else
        # Upsert: delete existing, create new
        EXISTING=$(curl -sf -X GET "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=A&name=${PODCLAW_DOMAIN}" \
          -H "Authorization: Bearer ${PODCLAW_CF_API_TOKEN}" | jq -r '.result[0].id // empty')

        if [ -n "${EXISTING}" ]; then
          curl -sf -X DELETE "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${EXISTING}" \
            -H "Authorization: Bearer ${PODCLAW_CF_API_TOKEN}" > /dev/null
        fi

        curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
          -H "Authorization: Bearer ${PODCLAW_CF_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data "{\"type\":\"A\",\"name\":\"${PODCLAW_DOMAIN}\",\"content\":\"${GUEST_IP}\",\"ttl\":120,\"proxied\":false}" > /dev/null

        log "DNS A record created: ${PODCLAW_DOMAIN} -> ${GUEST_IP}"
      fi

      # --- Start Traefik ---
      log "Starting Traefik service"
      systemctl --machine "${OPENCLAW_USER}@" --user daemon-reload || true
      systemctl --machine "${OPENCLAW_USER}@" --user start traefik.service || true

      log "Traefik setup complete"
      log "OpenClaw available at: https://${PODCLAW_DOMAIN}/"

  - path: /opt/podclaw/traefik/traefik.yml
    content: |
      # traefik/traefik.yml -- Traefik v3 static configuration
      api:
        dashboard: false

      entryPoints:
        web:
          address: ":80"
          http:
            redirections:
              entryPoint:
                to: websecure
                scheme: https
        websecure:
          address: ":443"

      certificatesResolvers:
        letsencrypt:
          acme:
            email: "${PODCLAW_ACME_EMAIL}"
            storage: /letsencrypt/acme.json
            dnsChallenge:
              provider: cloudflare
              resolvers:
                - "1.1.1.1:53"
                - "1.0.0.1:53"

      providers:
        file:
          directory: /etc/traefik/dynamic
          watch: true

      log:
        level: INFO

  - path: /opt/podclaw/traefik/dynamic/openclaw.yml
    content: |
      # traefik/dynamic/openclaw.yml -- Route to OpenClaw gateway
      http:
        routers:
          openclaw:
            rule: "Host(`${PODCLAW_DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: openclaw

          openclaw-ws:
            rule: "Host(`${PODCLAW_DOMAIN}`) && PathPrefix(`/ws`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: openclaw

        services:
          openclaw:
            loadBalancer:
              servers:
                - url: "http://127.0.0.1:18789"

  - path: /opt/podclaw/traefik/traefik.container
    content: |
      # traefik/traefik.container -- Traefik Quadlet for rootless Podman
      [Unit]
      Description=Traefik reverse proxy with Let's Encrypt
      After=openclaw.service

      [Container]
      Image=docker.io/traefik:v3.3
      ContainerName=traefik
      Network=host
      Volume=traefik-certs:/letsencrypt:Z
      Volume=%h/.config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro,Z
      Volume=%h/.config/traefik/dynamic:/etc/traefik/dynamic:ro,Z
      Environment=CF_DNS_API_TOKEN=${PODCLAW_CF_API_TOKEN}
      Pull=newer

      [Service]
      TimeoutStartSec=120
      Restart=on-failure

      [Install]
      WantedBy=default.target

runcmd:
  - /opt/podclaw/scripts/setup-openclaw.sh
  # Optional: set up Traefik TLS reverse proxy if domain is configured.
  # The ${PODCLAW_*} placeholders are substituted by the launch script via sed.
  # If unset, they become empty strings and the if-block is skipped.
  - |
    if [ -n "${PODCLAW_DOMAIN}" ] && [ -n "${PODCLAW_CF_API_TOKEN}" ] && [ -n "${PODCLAW_ACME_EMAIL}" ]; then
      PODCLAW_DOMAIN="${PODCLAW_DOMAIN}" \
      PODCLAW_CF_API_TOKEN="${PODCLAW_CF_API_TOKEN}" \
      PODCLAW_ACME_EMAIL="${PODCLAW_ACME_EMAIL}" \
      /opt/podclaw/scripts/setup-traefik.sh
    fi
