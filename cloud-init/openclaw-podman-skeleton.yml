#cloud-config
# Variables substituted by launch scripts:
#   PODCLAW_ADMIN_USER   -- admin username for troubleshooting (required)
#   PODCLAW_SSH_KEY      -- SSH public key for admin user (required)
#   PODCLAW_DOMAIN       -- domain for TLS (optional, enables Traefik)
#   PODCLAW_CF_API_TOKEN -- Cloudflare API token for DNS challenge (optional)
#   PODCLAW_ACME_EMAIL   -- email for Let's Encrypt (optional)
package_update: true
package_upgrade: true
packages:
  - curl
  - git

users:
  # Admin user for troubleshooting. UID 1100 to keep UID 1000 free for
  # the openclaw user, which must match the container's node user (UID 1000)
  # for podman --userns keep-id volume mounts to work correctly.
  - name: ${PODCLAW_ADMIN_USER}
    uid: 1100
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${PODCLAW_SSH_KEY}

runcmd:
  # Download and run OpenClaw setup (installs its own deps)
  - curl -fsSL https://raw.githubusercontent.com/mikestankavich/podclaw/main/scripts/setup-openclaw.sh -o /opt/setup-openclaw.sh
  - chmod +x /opt/setup-openclaw.sh
  - /opt/setup-openclaw.sh
  # Optional: set up Traefik TLS reverse proxy if domain is configured.
  # The ${PODCLAW_*} placeholders are substituted by the launch script via sed.
  # If unset, they become empty strings and the if-block is skipped.
  - |
    if [ -n "${PODCLAW_DOMAIN}" ] && [ -n "${PODCLAW_CF_API_TOKEN}" ] && [ -n "${PODCLAW_ACME_EMAIL}" ]; then
      curl -fsSL https://raw.githubusercontent.com/mikestankavich/podclaw/main/scripts/setup-traefik.sh -o /opt/setup-traefik.sh
      chmod +x /opt/setup-traefik.sh
      PODCLAW_DOMAIN="${PODCLAW_DOMAIN}" \
      PODCLAW_CF_API_TOKEN="${PODCLAW_CF_API_TOKEN}" \
      PODCLAW_ACME_EMAIL="${PODCLAW_ACME_EMAIL}" \
      /opt/setup-traefik.sh
    fi
