## template: jinja
{% set user = user or "mike" %}
{% set ssh_key = ssh_key or "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIsrQEHKvwPZI8lOBF1j7t9pMUW28pRAZ914BjTnAwW7 mike@kwyk.net" %}

#cloud-config
package_update: true
package_upgrade: true
packages:
  - curl
  - git
  - podman
  - systemd-container
  - avahi-daemon
  - openssh-server
  - nano
  - tmux
  - jq
  - fuse-overlayfs
  - apparmor-utils

users:
  # Admin user for troubleshooting
  - name: {{ user }}
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - {{ ssh_key }}

  # NOTE: The openclaw user is created in runcmd below (not here).
  # setup-podman.sh checks for existing users and skips creation if found.
  # We pre-create the user so we can configure fuse-overlayfs storage
  # BEFORE setup-podman.sh runs (avoiding the slow storage-chown-by-maps).

write_files:
  # AppArmor profiles to allow rootless Podman user namespaces.
  # Ubuntu 24.04 sets kernel.apparmor_restrict_unprivileged_userns=1
  # which blocks unprivileged unshare/clone unless the binary has an
  # AppArmor profile granting the 'userns' permission.
  - path: /etc/apparmor.d/podman-userns
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile podman /usr/bin/podman flags=(unconfined) {
        userns,
      }

  - path: /etc/apparmor.d/conmon-userns
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile conmon /usr/bin/conmon flags=(unconfined) {
        userns,
      }

  - path: /etc/apparmor.d/crun-userns
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile crun /usr/bin/crun flags=(unconfined) {
        userns,
      }

  - path: /etc/apparmor.d/slirp4netns-userns
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile slirp4netns /usr/bin/slirp4netns flags=(unconfined) {
        userns,
      }

  - path: /etc/apparmor.d/pasta-userns
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile pasta /usr/bin/pasta flags=(unconfined) {
        userns,
      }

runcmd:
  # --- Step 1: Load AppArmor userns profiles ---
  - apparmor_parser -r /etc/apparmor.d/podman-userns
  - apparmor_parser -r /etc/apparmor.d/conmon-userns
  - apparmor_parser -r /etc/apparmor.d/crun-userns
  - apparmor_parser -r /etc/apparmor.d/slirp4netns-userns
  - apparmor_parser -r /etc/apparmor.d/pasta-userns

  # --- Step 2: Pre-create openclaw user with fuse-overlayfs storage ---
  # Create the user before setup-podman.sh so we can configure the Podman
  # storage driver. setup-podman.sh detects existing users and skips creation.
  - useradd -m -s /usr/sbin/nologin openclaw
  - loginctl enable-linger openclaw
  - |
    # Start the user systemd instance so XDG_RUNTIME_DIR exists
    OPENCLAW_UID=$(id -u openclaw)
    systemctl start "user@${OPENCLAW_UID}.service" || true
    # Configure fuse-overlayfs to avoid storage-chown-by-maps with userns keep-id
    mkdir -p /home/openclaw/.config/containers
    printf '[storage]\ndriver = "overlay"\n\n[storage.options.overlay]\nmount_program = "/usr/bin/fuse-overlayfs"\n' \
      > /home/openclaw/.config/containers/storage.conf
    chown -R openclaw:openclaw /home/openclaw/.config
    # Add subuid/subgid ranges for rootless Podman
    echo "openclaw:100000:65536" >> /etc/subuid
    echo "openclaw:100000:65536" >> /etc/subgid
    # Pre-create OpenClaw config so setup-podman.sh skips its own defaults.
    # The Quadlet uses --bind lan (non-loopback) so controlUi needs origin config.
    # WARNING: dangerouslyAllowHostHeaderOriginFallback is for LAB USE ONLY.
    # In production, replace with explicit gateway.controlUi.allowedOrigins list.
    mkdir -p /home/openclaw/.openclaw/workspace
    chmod 700 /home/openclaw/.openclaw /home/openclaw/.openclaw/workspace
    printf '{\n  "gateway": {\n    "mode": "local",\n    "controlUi": {\n      "dangerouslyAllowHostHeaderOriginFallback": true\n    }\n  }\n}\n' \
      > /home/openclaw/.openclaw/openclaw.json
    chmod 600 /home/openclaw/.openclaw/openclaw.json
    chown -R openclaw:openclaw /home/openclaw/.openclaw

  # --- Step 3: Clone OpenClaw and run setup ---
  - git clone https://github.com/openclaw/openclaw /opt/openclaw || true
  - cd /opt/openclaw && OPENCLAW_PODMAN_QUADLET=1 ./setup-podman.sh

  # --- Step 4: Ensure service is started ---
  # setup-podman.sh with QUADLET starts the service, but belt-and-suspenders.
  - |
    systemctl --machine openclaw@ --user daemon-reload || true
    systemctl --machine openclaw@ --user restart openclaw.service || true

  # Fix any root-owned files in openclaw's home
  - chown -R openclaw:openclaw /home/openclaw || true
